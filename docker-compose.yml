version: '3.8'

services:
  hospitalmanagementapi:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DatabaseConnection=Host=db;Port=5432;Database=hospital_db;Username=postgres;Password=password;
    depends_on:
      - db
    volumes:
      - ./HospitalManagementApi.API/logs:/app/logs

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=hospital_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: